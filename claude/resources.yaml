# Claude Expert Agents - Resource Manifest
# Resources are fetched on-demand when agents are used

agents:
  solidity-chad:
    category: solidity
    resources:
      - name: solady
        repo: vectorized/solady
        sparse: [src/]
      - name: solmate
        repo: transmissions11/solmate
        sparse: [src/]
